name: 9Tours-CI

# ส่วนนี้คือ 'on' ที่ระบบฟ้องว่าหาไม่เจอครับ
on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build Backend
        run: |
          cd backend
          npm install
          npm run build

      - name: Install & Build Frontend
        run: |
          cd frontend
          npm install
          npm run build