name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      PORT: 3000
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USERNAME: init
      DB_PASSWORD: secret
      DB_DATABASE: 9tours_db
      JWT_SECRET: github-actions-test-secret
      CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: init
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: 9tours_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U init -d 9tours_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Build backend
        run: npm run build
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Start backend
        run: npm run start > ../backend.log 2>&1 &
        working-directory: backend

      - name: Seed database
        run: npm run db:bootstrap && npm run seed:tours
        working-directory: backend
        env:
          ENABLE_TOUR_JSON_IMPORT: 'false'

      - name: Start frontend
        run: npm run dev -- --host 127.0.0.1 > ../frontend.log 2>&1 &
        working-directory: frontend
        env:
          VITE_API_URL: http://127.0.0.1:3000

      - name: Wait for app servers
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/tours >/dev/null && curl -fsS http://127.0.0.1:5173/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo 'Backend log:'
          cat backend.log || true
          echo 'Frontend log:'
          cat frontend.log || true
          exit 1

      - name: Run Playwright tests
        run: npx playwright test
        env:
          PLAYWRIGHT_API_URL: http://127.0.0.1:3000
          PLAYWRIGHT_FRONTEND_URL: http://127.0.0.1:5173

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: app-logs
          path: |
            backend.log
            frontend.log
          retention-days: 7
